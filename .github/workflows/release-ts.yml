name: Release TypeScript

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "packages/ts/**"
      - ".changeset/**"

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for OIDC trusted publishing
        # Node 22's bundled npm can have a broken self-upgrade path
        # ("Cannot find module 'promise-retry'"). --force skips the broken
        # dep check during install. Pin to @11 to avoid future regressions.
        run: npm install -g --force npm@11

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter "./packages/ts/*" run build

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          title: "chore(ts-release): version packages"
          commit: "chore(ts-release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
