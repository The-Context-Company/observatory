name: Release TypeScript

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "packages/ts/**"
      - ".changeset/**"

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for OIDC trusted publishing
        # Node 22's bundled npm can itself be corrupted ("Cannot find module
        # 'promise-retry'") and can't even run `npm install` on itself.
        # Use corepack to bypass the broken bundled npm entirely.
        run: |
          corepack enable npm
          corepack prepare npm@11.5.2 --activate
          npm --version

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter "./packages/ts/*" run build

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          title: "chore(ts-release): version packages"
          commit: "chore(ts-release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
