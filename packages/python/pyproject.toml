[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "contextcompany"
version = "0.1.3"
description = "The Context Company AI Agent Observability SDK for Python"
requires-python = ">=3.9"
license = {text = "MIT"}
authors = [
    {name = "The Context Company", email = "support@thecontext.company"},
]
keywords = ["observability", "ai", "agents", "llm", "tracing", "monitoring"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Monitoring",
]
dependencies = [
    "requests>=2.31.0",
]

[project.urls]
Homepage = "https://thecontext.company"
Documentation = "https://docs.thecontext.company"
Repository = "https://github.com/The-Context-Company/observatory"
Issues = "https://github.com/The-Context-Company/observatory/issues"

[tool.hatch.build.targets.wheel]
packages = ["contextcompany"]

# ── Semantic Release ──────────────────────────────────────────────
[tool.semantic_release]
branch = "main"
tag_format = "python-v{version}"
commit_message = "chore(python-release): {version}"
major_on_zero = false
build_command = "python -m build"
version_toml = ["pyproject.toml:project.version"]
version_variables = ["contextcompany/__init__.py:__version__"]

[tool.semantic_release.commit_parser_options]
allowed_tags = ["feat", "fix", "perf", "refactor", "docs", "test", "chore", "build", "ci", "style"]
minor_tags = ["feat"]
patch_tags = ["fix", "perf"]

[tool.semantic_release.remote]
type = "github"
token = { env = "GH_TOKEN" }

[tool.semantic_release.changelog]
changelog_file = "CHANGELOG.md"
